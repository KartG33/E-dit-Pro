name: Deploy static content to Pages

on:
  # Запускать билд при каждом пуше в ветку main (если у вас ветка master - поменяйте на master)
  push:
    branches: ["main"]
  # Позволяет запускать этот процесс вручную из вкладки Actions
  workflow_dispatch:

# Настройки доступов для деплоя на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Управляет одновременными деплоями (отменяет старые, если пошел новый пуш)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Загружаем именно папку dist, в которой лежит всё готовое и manifest PWA

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
